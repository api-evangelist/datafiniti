naftiko: 1.0.0-alpha2
info:
  label: Datafiniti API — Properties
  description: 'Datafiniti API — Properties. 1 operations. Lead operation: Search property records. Self-contained Naftiko
    capability covering one Datafiniti business surface.'
  tags:
  - Datafiniti
  - Properties
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATAFINITI_API_KEY: DATAFINITI_API_KEY
capability:
  consumes:
  - type: http
    namespace: datafiniti-properties
    baseUri: https://api.datafiniti.co/v4
    description: Datafiniti API — Properties business capability. Self-contained, no shared references.
    resources:
    - name: properties-search
      path: /properties/search
      operations:
      - name: searchproperties
        method: POST
        description: Search property records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATAFINITI_API_KEY}}'
  exposes:
  - type: rest
    namespace: datafiniti-properties-rest
    port: 8080
    description: REST adapter for Datafiniti API — Properties. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/properties/search
      name: properties-search
      description: REST surface for properties-search.
      operations:
      - method: POST
        name: searchproperties
        description: Search property records
        call: datafiniti-properties.searchproperties
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datafiniti-properties-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datafiniti API — Properties. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: search-property-records
      description: Search property records
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datafiniti-properties.searchproperties
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
