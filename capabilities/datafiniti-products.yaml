naftiko: 1.0.0-alpha2
info:
  label: Datafiniti API — Products
  description: 'Datafiniti API — Products. 1 operations. Lead operation: Search product records. Self-contained Naftiko capability
    covering one Datafiniti business surface.'
  tags:
  - Datafiniti
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATAFINITI_API_KEY: DATAFINITI_API_KEY
capability:
  consumes:
  - type: http
    namespace: datafiniti-products
    baseUri: https://api.datafiniti.co/v4
    description: Datafiniti API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products-search
      path: /products/search
      operations:
      - name: searchproducts
        method: POST
        description: Search product records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATAFINITI_API_KEY}}'
  exposes:
  - type: rest
    namespace: datafiniti-products-rest
    port: 8080
    description: REST adapter for Datafiniti API — Products. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/products/search
      name: products-search
      description: REST surface for products-search.
      operations:
      - method: POST
        name: searchproducts
        description: Search product records
        call: datafiniti-products.searchproducts
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datafiniti-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datafiniti API — Products. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-product-records
      description: Search product records
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datafiniti-products.searchproducts
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
