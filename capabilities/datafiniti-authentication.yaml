naftiko: 1.0.0-alpha2
info:
  label: Datafiniti API — Authentication
  description: 'Datafiniti API — Authentication. 1 operations. Lead operation: Issue a bearer token. Self-contained Naftiko
    capability covering one Datafiniti business surface.'
  tags:
  - Datafiniti
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATAFINITI_API_KEY: DATAFINITI_API_KEY
capability:
  consumes:
  - type: http
    namespace: datafiniti-authentication
    baseUri: https://api.datafiniti.co/v4
    description: Datafiniti API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth
      path: /auth
      operations:
      - name: authenticate
        method: POST
        description: Issue a bearer token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATAFINITI_API_KEY}}'
  exposes:
  - type: rest
    namespace: datafiniti-authentication-rest
    port: 8080
    description: REST adapter for Datafiniti API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth
      name: auth
      description: REST surface for auth.
      operations:
      - method: POST
        name: authenticate
        description: Issue a bearer token
        call: datafiniti-authentication.authenticate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datafiniti-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datafiniti API — Authentication. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: issue-bearer-token
      description: Issue a bearer token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datafiniti-authentication.authenticate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
