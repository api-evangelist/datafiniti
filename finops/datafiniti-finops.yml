  - FOCUS
description: 'FOCUS-aligned FinOps for Datafiniti: subscription billing scaled by record volume
  across four data products (Property, People, Business, Product). The primary billable unit is a
  delivered record. Specific per-record rates are gated behind portal sign-up.'
sources:
  - https://datafiniti.co
  - https://portal.datafiniti.co
notes: No public per-unit pricing; reconciled false. Meter shape is correct (records-as-unit) but
  the dollar values must be sourced from the customer's portal.
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Datafiniti
  ServiceCategory: Data as a Service
  ServiceSubcategory: Web Data Aggregation
  ProviderName: Datafiniti
  PublisherName: Datafiniti, LLC
  InvoiceIssuerName: Datafiniti, LLC
  PricingCategory: Subscription + Usage
  PricingUnit: record
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: records_delivered
    description: Count of unique records returned via search, download, or bulk export. The primary
      billable line.
    unit: record
    aggregation: sum
    dimensions:
      - dataset
      - api_key
      - consumer
  - name: api_requests
    description: Count of API requests issued against the search and download endpoints.
    unit: request
    aggregation: count
    dimensions:
      - endpoint
      - api_key
  - name: bulk_downloads
    description: Bulk download exports requested through the portal or API.
    unit: download
    aggregation: count
    dimensions:
      - dataset
      - api_key
principles:
  - name: Visibility
    description: Use the Datafiniti portal usage dashboard plus per-response record counts to track
      consumption. Aggregate API responses into internal observability since record volume drives
      cost.
  - name: Allocation
    description: Issue separate API keys per consuming product or team so record consumption can
      be sliced. Datafiniti does not provide cost-allocation tags natively.
  - name: Optimization
    description: Filter aggressively server-side, request only required fields, and prefer search
      over download for exploration so you do not pay for records you do not retain. Cache stable
      records locally to avoid re-pulling.
  - name: Accountability
    description: Set monthly record-budget alerts in the portal, designate a budget owner per
      dataset, and review consumption against business-value metrics (records-converted-to-leads,
      records-per-listing).
maintainers:
