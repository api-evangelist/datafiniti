specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Datafiniti
providerId: datafiniti
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Business Data
  - Data as a Service
  - People Data
  - Product Data
  - Property Data
description: Datafiniti markets a "flexible plans and pricing" model that scales by record volume
  rather than feature gating, with trial usage, month-to-month plans, and custom tiers. Specific
  per-record prices and tier thresholds are not published on the public site — pricing is gated
  behind a free-trial sign-up at portal.datafiniti.co or a sales conversation. Each of the four
  data products (Property, People, Business, Product) is offered with a free trial.
sources:
  - https://datafiniti.co
  - https://portal.datafiniti.co
notes: Pricing is gated behind portal account creation / sales request. Vendor states pricing scales
  by record volume rather than feature gating. No public numbers to reconcile against.
plans:
  - id: datafiniti-trial
    name: Free Trial
    type: freemium
    description: Free trial available for each of the four data products (Property, People,
      Business, Product). Specific record allowances are not published.
    entries:
      - label: Trial records
        name: trial_records
        type: quota
        metric: record
        limit: see datafiniti.co
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Property Data trial
      - name: People Data trial
      - name: Business Data trial
      - name: Product Data trial
      - name: Datafiniti API access
      - name: Web portal access
  - id: datafiniti-subscription
    name: Subscription
    type: subscription
    description: Month-to-month subscription priced by record volume. Specific per-record rates
      and monthly thresholds are quoted via the portal or sales.
    entries:
      - label: Records
        name: records
        type: metered
        metric: record
        limit: see datafiniti.co
        timeFrame: month
        geo: global
        unit: 1
        price: see datafiniti.co
        userMultiplied: false
    elements:
      - name: Search and download endpoints
      - name: Bulk downloads
      - name: API and portal access
      - name: Datafiniti Business Data API
      - name: Datafiniti Product Data API
      - name: Datafiniti Property Data API
      - name: Datafiniti People Data API
  - id: datafiniti-custom
    name: Custom
    type: enterprise
    description: Custom-negotiated tier for high-volume customers. Pricing and entitlements are
      contract-specific.
    entries:
      - label: Records
        name: records
        type: metered
        metric: record
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Custom record volumes
      - name: Custom data delivery
      - name: Dedicated support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
